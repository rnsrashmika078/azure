<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload to Azure Blob Storage</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .upload-form { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 8px; }
        input[type="file"] { margin: 20px 0; }
        button { background: #0078d4; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #106ebe; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #dff6dd; color: #2e7d32; }
        .error { background: #fdd; color: #c62828; }
        .loading { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <h1>Upload File to Azure</h1>
    <form class="upload-form" id="uploadForm">
        <input type="file" name="fileToUpload" id="fileToUpload" required>
        <br>
        <button type="submit" id="uploadBtn">Upload</button>
    </form>
    <div id="status"></div>

    <script>
        // Azure Configuration
        const config = {
            storageAccount: 'fileuploader12',
            containerName: 'rashmika',
            sasToken: 'sp=r&st=2026-04-29T06:55:49Z&se=2026-04-29T15:10:49Z&spr=https&sv=2025-11-05&sr=c&sig=HR6rJ780ignhdLhGw8psahlEEUzpzWKSK4ZrPMzgEXU%3D'
        };

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileToUpload');
            const file = fileInput.files[0];
            const statusDiv = document.getElementById('status');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (!file) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Please select a file';
                return;
            }

            uploadBtn.disabled = true;
            statusDiv.className = 'loading';
            statusDiv.textContent = 'Uploading...';

            try {
                const blobUrl = `https://${config.storageAccount}.blob.core.windows.net/${config.containerName}/${file.name}?${config.sasToken}`;
                
                const response = await fetch(blobUrl, {
                    method: 'PUT',
                    headers: {
                        'x-ms-blob-type': 'BlockBlob',
                        'x-ms-date': new Date().toUTCString(),
                        'x-ms-version': '2021-08-06',
                        'Content-Type': file.type || 'application/octet-stream'
                    },
                    body: file
                });

                if (response.ok || response.status === 201) {
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = `File uploaded successfully!<br><a href="${blobUrl}" target="_blank">View File</a>`;
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Upload failed: ' + error.message;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
